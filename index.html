<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日简报 · 初始化中</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Noto+Serif+SC:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  body {
    background: #ebe2cd;
    color: #1a1410;
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    padding: 40px;
    text-align: center;
  }
  .box { max-width: 580px; }
  h1 {
    font-family: 'Fraunces', 'Noto Serif SC', serif;
    font-size: clamp(48px, 8vw, 80px);
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin: 0 0 24px;
  }
  h1 em { font-style: italic; color: #8a2419; font-weight: 400; }
  p { font-size: 18px; line-height: 1.7; color: #58493a; }
  .pulse {
    display: inline-block;
    width: 10px;
    height: 10px;
    background: #b8362a;
    border-radius: 50%;
    margin-right: 8px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  code {
    font-family: 'JetBrains Mono', monospace;
    background: #f1eada;
    padding: 2px 8px;
    font-size: 14px;
    border-radius: 3px;
  }
  .hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #8b7a64;
    margin-top: 32px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="box">
  <h1>每日<em>简</em>报</h1>
  <p><span class="pulse"></span>初始化中…</p>
  <p>首次部署完成。手动触发一次 <code>Update Daily Brief</code> workflow，<br>
  或等明天的定时任务跑完，这页会被替换成今日内容。</p>
  <p class="hint">→ Actions 标签 → Update Daily Brief → Run workflow</p>
</div>
</body>
</html>
